name: Intent

on:
  pull_request:
    paths:
      - "skills/**"
      - "**/skills/**"
      - "_artifacts/**"
      - "**/_artifacts/**"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Skill
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: corepack enable pnpm

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Skill
        run: pnpm exec intent validate --github-summary

  review:
    name: Skill Coverage
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: corepack enable pnpm

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Skill Coverage
        id: stale
        run: |
          pnpm exec intent stale --github-review --package-label "@zahastudio/uniswap-sdk-monorepo"

      - name: Review PR
        if: steps.stale.outputs.has_review == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name || 'manual' }}"
          BRANCH="skills/review-${VERSION}"
          BASE_BRANCH="${{ github.event.repository.default_branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "$BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
            git commit --allow-empty -m "chore: review intent skills for ${VERSION}"
            git push origin "$BRANCH"
          fi

          PR_URL="$(gh pr list --head "$BRANCH" --json url --jq '.[0].url')"
          if [ -n "$PR_URL" ]; then
            gh pr edit "$PR_URL" --body-file pr-body.md
          else
            gh pr create \
              --title "Review intent skills (${VERSION})" \
              --body-file pr-body.md \
              --head "$BRANCH" \
              --base "$BASE_BRANCH"
          fi
